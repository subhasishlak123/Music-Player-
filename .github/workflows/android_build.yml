name: Build My Smart Player
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # STEP 1: Manually create the folder and download the missing JAR file
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      # STEP 2: Make the script executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # STEP 3: Build the APK
      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: SmartMusicPlayer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
